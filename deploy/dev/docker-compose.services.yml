version: "3.9"

# Whisper + Ollama only — use when running WhisperCrawl  locally (python -m whispercrawl).
# Services are exposed on localhost so config.yaml defaults (localhost:9000 / localhost:11434) work as-is.
#
# Requires HF_TOKEN in .env at project root for whisperx diarization (see .env.example).
#
# Usage:
#   docker compose -f deploy/dev/docker-compose.services.yml up -d
#   docker compose -f deploy/dev/docker-compose.services.yml exec ollama ollama pull gemma3:1b

services:

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    ports:
      - "9000:9000"
    environment:
      ASR_MODEL: tiny          # tiny | base | small | medium | large
      ASR_ENGINE: whisperx
      HF_TOKEN: ${HF_TOKEN}   # set in .env at project root (see .env.example)
      HF_HUB_DISABLE_TELEMETRY: true
      # HF_HUB_OFFLINE: true    # enable after pyannote model is cached in hf_cache volume
    volumes:
      - whisper_cache:/root/.cache/whisper
      - hf_cache:/root/.cache/huggingface   # persists pyannote diarization model
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  whisper_cache:
  hf_cache:
  ollama_data:
