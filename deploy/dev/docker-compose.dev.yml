version: "3.9"

# Dev — everything in Docker.
# WhisperCrawl connects to whisper and ollama via internal Docker network.
#
# Usage:
#   docker compose -f deploy/dev/docker-compose.dev.yml up -d
#   docker compose -f deploy/dev/docker-compose.dev.yml run --rm whispercrawl --once
#
# After changing src/ or pyproject.toml, rebuild the whispercrawl image:
#   docker compose -f deploy/dev/docker-compose.dev.yml up -d --build whispercrawl
#
# Config: edit config.yaml at project root — service URLs and paths are injected via
#   environment variables (see the whispercrawl.environment block below); no manual edits needed.

services:

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    ports:
      - "9000:9000"
    environment:
      ASR_MODEL: tiny          # tiny | base | small | medium | large
      ASR_ENGINE: whisperx
      HF_TOKEN: ${HF_TOKEN}   # set in .env at project root (see .env.example)
      HF_HUB_DISABLE_TELEMETRY: true
      # HF_HUB_OFFLINE: true    # enable after pyannote model is cached in hf_cache volume
    volumes:
      - whisper_cache:/root/.cache/whisper
      - hf_cache:/root/.cache/huggingface   # persists pyannote diarization model
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  whispercrawl:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      WATCH_DIR: /audio
      WHISPER_URL: http://whisper:9000
      OLLAMA_URL: http://ollama:11434
      LOGS_DIR: /logs
    volumes:
      - ../../audio:/audio
      - ../../config.yaml:/config.yaml:ro
      - ../../logs:/logs
    depends_on:
      - whisper
      - ollama
    restart: unless-stopped

volumes:
  whisper_cache:
  hf_cache:
  ollama_data:
